basePath: /api/v1
definitions:
  controllers.BookAll:
    properties:
      books:
        items:
          $ref: '#/definitions/models.BookSwagger'
        type: array
      limit:
        type: integer
      page:
        type: integer
      total:
        type: integer
    type: object
  controllers.BorrowBookRequest:
    properties:
      id_anggota:
        type: string
      id_buku:
        type: string
      loan_duration:
        type: string
    required:
    - id_anggota
    - id_buku
    - loan_duration
    type: object
  controllers.BorrowBookResponse:
    properties:
      id:
        description: or int64 if that's your ID type
        type: string
      message:
        type: string
    type: object
  controllers.CreateBookFormSwagger:
    properties:
      deskripsi:
        maxLength: 1000
        minLength: 3
        type: string
      isbn:
        maxLength: 17
        minLength: 10
        type: string
      judul:
        maxLength: 255
        minLength: 3
        type: string
      jumlah_eksemplar:
        minimum: 1
        type: integer
      kategori:
        maxLength: 255
        minLength: 3
        type: string
      penerbit:
        maxLength: 255
        minLength: 3
        type: string
      pengarang:
        maxLength: 255
        minLength: 3
        type: string
      tahun_terbit:
        type: integer
    required:
    - deskripsi
    - isbn
    - judul
    - jumlah_eksemplar
    - kategori
    - penerbit
    - pengarang
    - tahun_terbit
    type: object
  controllers.ReturnBookRequest:
    properties:
      transaction_id:
        type: string
    required:
    - transaction_id
    type: object
  forms.LoginForm:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  forms.RegisterFormSwagger:
    properties:
      alamat:
        type: string
      email:
        type: string
      filename:
        description: Foto field omitted
        type: string
      nama:
        type: string
      nomor_telepon:
        type: string
      password:
        minLength: 8
        type: string
      status_anggota:
        type: integer
      tanggal_lahir:
        type: string
    required:
    - alamat
    - email
    - nama
    - nomor_telepon
    - password
    - status_anggota
    - tanggal_lahir
    type: object
  forms.Token:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  models.BookCreatedResponse:
    properties:
      id:
        type: string
      message:
        type: string
    type: object
  models.BookSwagger:
    properties:
      created_at:
        type: string
      deskripsi:
        type: string
      foto:
        type: string
      id:
        type: string
      isbn:
        type: string
      judul:
        type: string
      jumlah_eksemplar:
        type: integer
      jumlah_ketersediaan_eksemplar:
        type: integer
      kategori:
        type: string
      penerbit:
        type: string
      pengarang:
        type: string
      tahun_terbit:
        type: integer
      updated_at:
        type: string
    type: object
  models.ErrorResponse:
    properties:
      error:
        description: Or "message" if that's what you use
        type: string
    type: object
  models.LoginResponse:
    properties:
      message:
        type: string
      token:
        $ref: '#/definitions/models.Token'
      user:
        $ref: '#/definitions/models.UserSwagger'
    type: object
  models.LogoutResponse:
    properties:
      message:
        type: string
    type: object
  models.RegisterResponse:
    properties:
      message:
        type: string
      user:
        $ref: '#/definitions/models.UserSwagger'
    type: object
  models.Token:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
  models.TokenResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
  models.TransactionSwagger:
    properties:
      denda:
        description: Use int64 (or string) for Swagger
        type: integer
      id:
        type: string
      id_anggota:
        type: string
      id_buku:
        type: string
      status:
        type: integer
      tanggal_jatuh_tempo:
        type: string
      tanggal_kembali:
        description: Use string for Swagger
        type: string
      tanggal_pinjam:
        type: string
    type: object
  models.UserSwagger:
    properties:
      alamat:
        type: string
      created_at:
        type: integer
      email:
        type: string
      foto:
        description: Use string for Swagger
        type: string
      id:
        type: integer
      nama:
        type: string
      nomor_telepon:
        type: string
      password:
        type: string
      status_anggota:
        type: integer
      tanggal_join:
        type: string
      tanggal_lahir:
        type: string
      updated_at:
        type: integer
    type: object
  types.StandardResponse:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: API for library management system.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Perpustakaan Golang API
  version: "1.0"
paths:
  /books:
    get:
      description: Retrieve all books with pagination
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/types.StandardResponse'
            - properties:
                data:
                  $ref: '#/definitions/controllers.BookAll'
              type: object
      summary: Get All Books
      tags:
      - Books
    post:
      consumes:
      - multipart/form-data
      description: Add a new book
      parameters:
      - description: Create Book Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/controllers.CreateBookFormSwagger'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/types.StandardResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.BookCreatedResponse'
              type: object
        "406":
          description: Not Acceptable
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Create Book
      tags:
      - Books
  /books/{id}:
    delete:
      description: Delete a book by its ID
      parameters:
      - description: Book ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/types.StandardResponse'
            - properties:
                data:
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Delete Book
      tags:
      - Books
    get:
      description: Retrieve a book by its ID
      parameters:
      - description: Book ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/types.StandardResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.BookSwagger'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Get Book by ID
      tags:
      - Books
    put:
      consumes:
      - multipart/form-data
      description: Update an existing book
      parameters:
      - description: Book ID
        in: path
        name: id
        required: true
        type: string
      - description: Update Book Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/controllers.CreateBookFormSwagger'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/types.StandardResponse'
            - properties:
                data:
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "406":
          description: Not Acceptable
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Update Book
      tags:
      - Books
  /example:
    get:
      description: Validates the JWT token in the Authorization header.
      responses:
        "200":
          description: OK
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Validate Token
      tags:
      - Auth
  /reports/borrowed_books:
    get:
      description: Get borrowed book reports within a date range.
      parameters:
      - description: Start date (YYYY-MM-DD)
        in: query
        name: start_date
        type: string
      - description: End date (YYYY-MM-DD)
        in: query
        name: end_date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/types.StandardResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Borrowed Book Reports
      tags:
      - Reports
  /reports/returned_books:
    get:
      description: Get returned book reports within a date range.
      parameters:
      - description: Start date (YYYY-MM-DD)
        in: query
        name: start_date
        type: string
      - description: End date (YYYY-MM-DD)
        in: query
        name: end_date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/types.StandardResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Returned Book Reports
      tags:
      - Reports
  /token/refresh:
    post:
      consumes:
      - application/json
      description: Refresh access token
      parameters:
      - description: Refresh Token Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/forms.Token'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.TokenResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "406":
          description: Not Acceptable
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Refresh Token
      tags:
      - Auth
  /transactions/borrow:
    post:
      consumes:
      - application/json
      description: Borrow a book by member and book IDs.
      parameters:
      - description: Borrow Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/controllers.BorrowBookRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/types.StandardResponse'
            - properties:
                data:
                  $ref: '#/definitions/controllers.BorrowBookResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Borrow Book
      tags:
      - Transaction
  /transactions/return:
    put:
      consumes:
      - application/json
      description: Return a borrowed book by transaction ID.
      parameters:
      - description: Return Request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/controllers.ReturnBookRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/types.StandardResponse'
            - properties:
                data:
                  type: object
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Return Book
      tags:
      - Transaction
  /user/{id}/transactions:
    get:
      description: Retrieve transactions for a specific member.
      parameters:
      - description: Member ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/types.StandardResponse'
            - properties:
                data:
                  $ref: '#/definitions/models.TransactionSwagger'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Get Transactions by Member
      tags:
      - Transaction
  /user/login:
    post:
      consumes:
      - application/json
      description: Logs in a user.
      parameters:
      - description: Login Request
        in: body
        name: login
        required: true
        schema:
          $ref: '#/definitions/forms.LoginForm'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.LoginResponse'
        "406":
          description: Not Acceptable
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: User Login
      tags:
      - User
  /user/logout:
    get:
      description: Logs out a user.
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.LogoutResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: User Logout
      tags:
      - User
  /user/register:
    post:
      consumes:
      - multipart/form-data
      description: Register a new user
      parameters:
      - description: Register Request
        in: body
        name: register
        required: true
        schema:
          $ref: '#/definitions/forms.RegisterFormSwagger'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.RegisterResponse'
        "406":
          description: Not Acceptable
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: User Register
      tags:
      - User
swagger: "2.0"
